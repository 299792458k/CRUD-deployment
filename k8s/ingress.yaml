apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: default
  annotations:
    # 1. BẮT BUỘC: Để Minikube Ingress Controller nhận diện Resource này
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: crud-app.local
    http:
      paths:
      # Route /api/* → api-service:8080
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-service
            port:
              number: 8080
      # Route /* → client-service:80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: client-service
            port:
              number: 80
