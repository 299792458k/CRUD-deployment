apiVersion: v1
kind: Service
metadata:
  name: client-service
  namespace: default
  labels:
    app: client
spec:
  # NodePort = expose ra ngoài K8s cluster (qua Minikube IP)
  type: NodePort
  selector:
    # Route traffic đến Pods có label app: client
    app: client
  ports:
  - port: 80
    targetPort: 80
    # nodePort: K8s sẽ auto-assign 30000-32767 nếu không set
    # Hoặc bạn có thể set cụ thể:
    nodePort: 30080
    protocol: TCP
    name: http
