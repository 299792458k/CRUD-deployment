apiVersion: v1
kind: Service
metadata:
  name: client-service
  namespace: default
  labels:
    app: client
spec:
  # ClusterIP = expose chỉ nội bộ (Ingress sẽ proxy)
  type: ClusterIP
  selector:
    # Route traffic đến Pods có label app: client
    app: client
  ports:
  - port: 80
    targetPort: 80  # Vite dev server chạy port 4200
    protocol: TCP
    name: http
