server {
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy /api/* requests đến API container
  # "api" là tên service trong Docker Compose network
  location /api/ {
    proxy_pass http://api-service:8080/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Serve static files
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback: mọi request không khớp file nào sẽ về index.html
  # Điều này cần thiết để React Router hoạt động đúng
  location / {
    try_files $uri $uri/ /index.html;
  }
}
